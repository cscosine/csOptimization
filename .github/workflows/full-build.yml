  # create release section
  create-release:
    runs-on: ubuntu-latest
    needs: [build-linux-linux-ninja, build-linux-linux-ninja-multi-config-clang, build-windows-msvc2022-x64, build-windows-msvc2022-x64-LLVM]  # waits for all builds
    if: ${{ github.ref_type == 'tag' }}   # only on tag
    steps:
      - name: Download artifacts linux-linux-ninja
        uses: actions/download-artifact@v4
        with:
          name: linux-linux-ninja
          path: linux-linux-ninja

      - name: Download artifacts linux-linux-ninja-multi-config-clang
        uses: actions/download-artifact@v4
        with:
          name: linux-linux-ninja-multi-config-clang
          path: linux-linux-ninja-multi-config-clang

      - name: Download artifacts windows-msvc2022-x64
        uses: actions/download-artifact@v4
        with:
          name: windows-msvc2022-x64
          path: windows-msvc2022-x64

      - name: Download artifacts windows-msvc2022-x64-LLVM
        uses: actions/download-artifact@v4
        with:
          name: windows-msvc2022-x64-LLVM
          path: windows-msvc2022-x64-LLVM

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            linux-linux-ninja/*.zip
            linux-linux-ninja-multi-config-clang/*.zip
            windows-msvc2022-x64/*.zip
            windows-msvc2022-x64-LLVM/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # ---------------------------------------------------
